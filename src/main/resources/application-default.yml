spring:
  datasource:
    url: jdbc:mysql://localhost:3306/liveshop
    username: liveshop
    password: "1234"


  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false   # 개발환경: 마이그레이션 파일 수정 후 체크섬 불일치 무시
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id:
            client-secret:
            redirect-uri: "http://localhost:1882/login/oauth2/code/google"
            scope: [openid, profile, email]
          naver:
            client-id:
            client-secret:
            authorization-grant-type: authorization_code
            redirect-uri: "http://localhost:1882/login/oauth2/code/naver"
            scope: [name, email, nickname]
          kakao:
            client-id:
            client-secret:
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "http://localhost:1882/login/oauth2/code/kakao"
            scope: [profile_nickname]
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  mail:
    host: smtp.gmail.com
    port: 587
    username: ideakslee@gmail.com
    password: ""
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  jwt:
    secret: mm-secret-key-for-jwt-token-signing-must-be-long-enough
    access-token-minutes: 15
    refresh-token-minutes: 20160 #14일
  frontend-url: "http://localhost:5173"

  # MSSQL manymen_ppurio - SMS 전송 등록용 (ums_data INSERT)
  mssql-ppurio:
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    jdbc-url:
    username:
    password:

mybatis:
  type-aliases-package: co.kr.mmsoft.mmmemberservice.mybatis.domain
  mapper-locations: classpath:mybatis/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true


my:
  logging:
    level: debug

logging:
  level:
    root: info

    #spring security 관련
    org.flywaydb: ${my.logging.level}
    org.springframework.security:  ${my.logging.level}
    org.springframework.security.web:  ${my.logging.level}
    org.springframework.security.authentication:  ${my.logging.level}
    org.springframework.security.authorization:  ${my.logging.level}

    # spring web 관련
    org.springframework.web: ${my.logging.level}
    org.springframework.web.servlet.DispatcherServlet: ${my.logging.level}

    co.kr.mmsoft.mmmemberservice: ${my.logging.level}

# mm-member-service의 설정 파일
eureka:
  client:
    service-url:
      defaultZone: http://localhost:1761/eureka/
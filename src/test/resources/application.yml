# src/test/resources/application.yml
spring:
  application:
    name: mm-member-service
  config:
    import: "optional:none"
  cloud:
    config:
      enabled: false
      fail-fast: false

# JwtTokenProvider @Value 필수 속성 (application-default.yml은 test 프로파일에서 로드 안 됨)
app:
  jwt:
    secret: testSecretKeyForJWTTokenThatIsAtLeast32Chars!
    access-token-minutes: 15
    refresh-token-minutes: 20160
  frontend-url: "http://oauth.mmsoft.co.kr:1761"

# src/test/resources/application.yml
spring:
  config:
    import: "optional:configserver:http://localhost:1881"  # 테스트 시 Config Server 없어도 무시
  cloud:
    config:
      enabled: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-secret
            redirect-uri: "http://localhost/login/oauth2/code/google"
            scope: [openid, profile, email]
          naver:
            client-id: test-naver-client-id
            client-secret: test-naver-secret
            authorization-grant-type: authorization_code
            redirect-uri: "http://localhost/login/oauth2/code/naver"
            scope: [name, email]
          kakao:
            client-id: test-kakao-client-id
            client-secret: test-kakao-secret
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "http://localhost/login/oauth2/code/kakao"
            scope: [profile_nickname]
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  mail:
    host: smtp.gmail.com
    port: 587
    username: test@gmail.com
    password: "test-password"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: "test_secret_key_at_least_32_characters_long_for_hs256"
    access-token-minutes: 5
    refresh-token-minutes: 60
  frontend-url: "http://localhost:5173"